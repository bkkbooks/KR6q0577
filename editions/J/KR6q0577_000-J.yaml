body:
  text: 起宗真禪師語敘起宗真禪師行實記室力如錄大清康熙庚辰四月八日弟子力廣同職事等袖香入室請師詳說行實以曉後學師笑而不答廣目請師曰不見佛云凡有所相皆是虛妄我有何行實乎廣曰那畔消息無處啟口這邊生緣何妨吐露不假言說無以表白生平履歷願樂欲聞師曰余本貫人也先君姓胡諱應榮字春雨母洪氏俱樂善好施長齋繡佛拾棺多年齋僧無算崇禎戊寅十月二日余始生焉當其孕余之初先母夢一老衲露頂跣足攜一瓢一杖向余家乞食求宿先君納之因而有孕既孕在身寒暑不覺懷八月乃生生時下地不聲自寅至午如夢忽覺方始㘞地嗣後屢多災厄遇經卷則喜見殺不食至十一歲而先母見背余即奮出塵之志先君乃痛罵力阻勢不敢為于是喫齋報母早夜跪誦血盆尊經又為父齋僧數億萬居塵五十年日夜以不能出家為憂至庚午年乃捨家入菴兒輩延內外親友再四挽留且惡阻云有為我母披削者即與拼命當時近方知識莫敢為余披削余奮恨無已遂取刀自斷其髮焉是歲二月初三之夜夢坐于大山之麓山上一白牛闊角大身向余而來繞其左右余引手以摸而牛垂頭不動余即攀角以登其背牛便飛騰而出余甚驚恐至醒時通身皆汗及平明而山光宗元和尚至余述以告宗宗連聲致賀曰汝師至矣余詢所以宗曰水牯牛溈山公案也溈山和尚昨至我菴余即迎請過菴一見便喜如舊識即拜而薙染焉本月二十即上華山求戒得戒回即立誓禁足晨夕禮誦兼書一切法寶由是衣不解帶身不沾蓆至十月四面火起余搭衣持缽端坐佛前而火至菴左右盡息一日先師老人見余苦狀乃開導曰汝之精勤可謂至矣然欲了生死務當究明自己心地苟心地不明終是徒然余即問曰未審心地如何究明曰汝自看書經底禮拜底經行坐臥底穿衣喫飯底是什麼人余曰更沒有別箇老人厲聲曰你道畢竟是阿誰余方擬對老人以手掩口著力一推余跌得冷汗通身心便豁然一日老人來余正值坐香老人曰好箇伶俐衲僧無端向鬼窟裏著倒余起身禮拜曰敢問如何即是老人緩步曰要行便行余仍去就座曰你作麼生余曰某甲坐也不為分外曰拄杖不在苕帚柄聊與三十又一日老人來菴余門迎老人把住曰不容擬議道將一句來余與劈面一掌老人曰你打老僧那余曰某甲罪過老人點首曰宛有丈夫之作遂入索筆書偈曰開法四十年止付一法子戊遊南都今春披削爾見爾有大志精進勇猛耳生長仕家不愛朱與紫行同大丈夫骨格非凡比且具大智慧根器尤可喜一念已回光即合諸玄旨盡瘁以終身慎勿生少弛辦取佛祖心我宗賴子起不虛此遠來吾道而東矣達磨來東都付囑尼總持我今囑付汝古今亦如是余接得即命就火曰某甲不是這般種草且莫塗污他老人曰汝但將取當常如是精進深蓄厚養異日大興佛事不虛吾南遊一次也余方始拜受後余又寫老人頂相乞請題讚題云一片雲帆湘上來江南淮北漫徘徊白沙津畔堪遺影留與兒孫一展開并寫遺書偈語書畢即逝我天翼法兄奉靈龕回山余三年願滿乃出關上維揚持缽詣華山謝戒我得戒上定下菴和尚又以衣缽源瀛付余及回乃上溈山為先老人造塔并掃諸祖塔掃塔回乃建此寺經營布置皆余身親理焉鄙意原欲自了以度餘生丁丑十月二日余初度之辰我同慶電兄芙蓉姪暨本邑縉紳勸請出世開堂余堅辭不敢濫廁法門以辱先宗卻之不已乃效顰作鬼面神頭說脫空妄語種種敗闕不敢告人今被汝等追索不已不免盡情搬出亦任明眼衲僧笑破鼻孔板存楞嚴
