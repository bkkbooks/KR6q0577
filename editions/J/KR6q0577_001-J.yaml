body:
  text: 侍者力廣記錄住真州華嚴禪寺康熙丁丑十月初二師六旬初度大溈同慶電兄和尚芙蓉姪大師暨闔邑縉紳檀護等請就本寺開堂據室華嚴界闊香水海深南詢五十三處要且未識歸程如今直饒識得更須喫新長老手裏烏藤何故聻兵隨印轉將逐符行拈柱卓一卓便起披法衣脫卻珍御不失大人境界權掛垢衣豈減本地風光牽拽犁耙風雨裏天上人間絕覆藏陞座至法座前指座云大寶華王座高而無上廣而無邊當頭坐斷迥絕躋攀喝一喝遂陞拈香云此一瓣香根盤空界葉覆娑婆重而價不可酬尊而無物堪比熱向爐中專為祝延今上皇帝聖壽萬歲萬歲萬萬歲伏願堯風永被于四表湯德恒新于兩間又指香云此一瓣香出於東坡來自北海奉為滿朝文武闔邑縉紳伏願常為佛國屏翰永作法城金湯復拈香云此一瓣香枝出同條葉無異種奉為現前請主和尚及諸法屬伏願揭慧日於千秋續心燈于萬古復懷中取香云此一瓣香名不得狀不得覷之眼盲嗅著腦裂生長五濁世中安居荊棘林裏遇著箇沒意智底老古錐和根截斷枝葉不存拋向搕𢶍堆頭日炙風吹歷盡寒暑雖則重新花放到底惡性不除今對人天眾前不免乘時拈出供養潭州大溈山傳臨濟正宗第三十四世上古下梅先師大和尚用酬法乳之恩斂衣就座同慶和尚白椎云法筵龍象眾當觀第一義師云若論第一義諦三世諸佛歷代祖師天下老和尚千方百計橫說豎說總未有半人道著新長老忍俊不禁不免盡情與諸人說破乃拈拂子拂一拂云一時抖下了也莫有撥著便轉底衲僧麼出來新華嚴與汝證據一僧纔出師云不得禮拜僧拂袖便出師云放子三十棒問玄要君臣即不問如何是接物利生句師云揚子江心水北流進云如何是全提正今句師云一棒一條痕一掌一握血進云師唱誰家曲宗風嗣阿誰師打一棒云自來用得者箇慣進云不虛為臨濟兒孫師連棒云識甚好惡問天地同根萬物一體未審金山年多少師云東西十萬南北八千進云和尚年多少師云與金山不別進云恁麼則千江有水千江月萬里無雲萬里天師云且莫錯會好進云不得吾師親指示天寧豈見塔高低師打云且道是賞你是罰你僧擬議師喝退云妄語漢乃云黃花散彩紫菊飄香娘生面目覿露堂堂直是情與無情悉皆平等更說甚天地同根萬物一體驀豎拂子云還會麼直饒會得東西十萬南北八千設或不會新長老與你下箇注腳千江有水千江月萬里無雲萬里天者箇且止秪如山僧今日為國開堂且接物利生一句又作麼生道拂一拂云陣雲橫海上拔劍攪龍門同慶和尚結椎云諦觀法王法法王法如是下座當晚小參諸佛出世為一大事因緣列祖并興為一大事因緣天下老古錐搖唇鼓舌抖搜屎腸談玄談妙說性說心為一大事因緣現前諸人破恩愛綱發向上心參方訪道拼命捨身也只為一大事因緣未審喚甚麼作大事因緣莫是諸佛出世列祖并興便當得麼且喜沒交涉莫是談玄談妙說性說心便當得麼且喜沒交涉更莫是參方訪道拼命捨身便當得麼且喜沒交涉既總沒交涉畢竟喚甚麼作大事因緣不見僧問投子禪師如何是和尚大事因緣子云尹司空請老僧開堂大眾這則公案甚是直截只是古往今來不作世諦流布便作佛法商量所以孤負先聖埋沒己靈鮮有會者如今諸人若也直下會去不惟大事了畢便可獨步丹霄其或未然三條椽下七尺單前各自摸索去莫道新長老不為人好喝一喝下座謝同慶和尚芙蓉大師上堂兩掌鬧摑摑孤掌不浪鳴出頭天外看誰是個般人辭眾入楚掃祖塔小參湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識無知識休別覓拈拄杖云楖栗橫肩不顧人直入千峰萬峰去時有僧出問師以拄杖擉退云生平肝膽向人傾相識何如不相識溈山上堂吹無孔笛鼓沒弦琴聽者貴乎知音和者須是作家山僧昔年在揚子拾得一張焦尾常操太古清音爭奈鍾期不遇今來萬仞峰頂意欲囊藏高掛又被法兄和尚拶向曲彔床上不免逢場作戲迭奏箎乃橫按拂子作操琴勢云不是新豐調雲門曲亦非高山流水太古清音汝等欲知其中端的請試問取堂頭和尚僧問陽春白雪即不問同聲相應一句且作麼生道師云打麵還他州土麥唱歌須是帝鄉人進云一種沒弦琴唯師彈得妙師云又被風吹別調中進云恁麼則好音在耳人皆聳師云不是知音客徒勞話歲寒進云不是作家頻指點清濁高下誰解分師云果然承虛接響先老和尚像前上供水路三千今賺我真州鏟草恨當年莫言忤逆無回互懸怨重重敢不宜顧左右云且道那裏是是怨上香云𩖼𩖼栴檀爐內熱不須試驗髑髏前到同慶請上堂有句無句如藤倚樹四七二三不知落處要知落處麼擲下拄杖云試請方丈和尚與汝指注到芙蓉請上堂此是我先師老人建法幢立宗旨底處所不肖今日既到這裏豈可袖手傍觀乃云諸佛說不到處閉口道著列祖行不到處舉步踏著此是老人不惜眉毛與諸人解粘去縛底句子汝等諸人無不了知山僧如今要問諸人道著踏著底是個甚麼若道語言三昧因甚古人又道盡力道不出若道步步不離古人何故又道踏著即禍生這裏辨得倜儻分明許你登得先師堂入得先師室脫或未然休將閑學解埋沒祖師心二六時中當殷勤請益方丈溈山回小參舉大慧禪師出鄉歸上堂舉五祖和尚出隊歸示眾云出隊半箇月眼不見鼻孔失卻祖師禪拾得箇骨董且道向甚麼處著一分奉釋迦牟尼佛一分奉多寶佛塔大慧云徑山法孫出隊八十餘日鼻孔常與眼睛相見亦無祖師禪可失亦不曾拾得骨董既無骨董則無以奉釋迦牟尼佛亦無以奉多寶佛塔畢竟得箇甚麼夜深水漁不食滿船空載月明歸師云五祖拾得骨董徑山滿載明月雖然兩彩一騫要且同得同失華嚴遠孫入楚半歲也無得也無失但喜祖父田園界畔分明原本契書毫髮不朽今日歸來無可人事秪學得些湖南風氣不免舉似大眾拽捧旋風打莫嫌杜蠻佛成道日為力然剃度力修說優婆夷戒上堂現出明星初八夜眼光爍破四天下看來猶是欠唧溜迄至于今成話把雖然如是還有識得釋迦老子落處者麼若也識得無髮可削無戒可受妄相執著猶如夢幻智慧德相亦是強名若僧若俗或緇或素總與如來無二無別若也未識不免鏟卻殿前草轉俗為僧受持福田衣除素披緇三千威儀八萬細行且自熟習何故聻雪後始知松柏操事難方見丈夫心先老和尚忌上供舉高峰妙祖為雪嵒和尚上供云昔年瞎卻我眼今朝穿卻你鼻冤冤相報無休莫若克己復禮師云大小祖師猶未了在華嚴這裏不然昔年瞎卻我眼今朝穿卻你鼻一任叫苦含冤永作千秋準的何故如此不曲藏直除夕小參年已窮歲已盡好箇消息新未至舊將除正宜著眼看他舊底除向甚處新底來自何方這裏覷得破能為萬象主不逐四時凋還委悉麼震威一喝云爆竹一聲吹臘去玉梅幾點送春來元旦示眾年新月新日新時新珊瑚枝枝撐著月舊天舊地舊水舊山優曇朵朵透塵埃此二轉語有一轉有縱有奪有殺有活橫該八節四時豎攝四象兩儀亙古今而常新歷始終而不變有人辨得許你條令斬新倘其未能待我上山斫棒來天中節示眾今朝正是五月午蒲劍光寒逼寰宇諸障雜毒盡潛蹤鬼怪妖魔悉回互含冤叫苦入無門坐斷當陽絕伴侶驀然撞破黑山家燕尾大虫元是虎晒藏經示眾六月六日以前金鎖重重六月六日已後重重金鎖正當六月六日事如何展兩手云一時打開一任諸人搬底搬晒底晒溈山天兄和尚訃至上堂人從江西來帶得湖南信報道我法兄和尚般大涅槃為眾說法云末後一句始到牢關要津把斷水泄不通拈起訃書云大眾既水泄不通且道這箇從甚處得來良久顧左右云無人知此意令我憶南泉噓一噓下座天童密祖上供這箇老古錐慣擊塗毒鼓大唐國裏人含冤無處吐今遇忤逆孫翻面不認祖打折你驢腰亦任叫冤苦何故聻冤有頭債有主燒香便拜大梅與老和尚訃至上堂佛真法身猶若虛空應物現形如水中月只一月無二月明眼衲僧鑒不出大梅老慣饒舌數十餘年渾漏泄偶爾驚聞示泥洹乾坤大地俱失色大眾雖則法幢摧法梁折法海枯法眼滅須信真實為汝諸人說拍香几下座久雨不晴示眾舉天目禮禪師示眾云久雨不晴滴爛虛空會與不會南北西東師云有道天目漏逗太煞殊不知這漢撦東拽西敗闕不少華嚴不是貶剝古人且貴流通正眼乃云久雨不晴虛空不濕直下薦取眉橫鼻直華嚴恁般舉唱或有箇出來道如斯說話也是徐六擔板只向道逢人但恁麼舉立秋示眾金風扇野玉露垂珠萬水澄波千峰削色草木憔悴光華銀河愈見皎潔蛩吟砌畔鶴唳長空客窗午夢魂消萬里家山頃刻當恁麼時正好驟步歸家識取祖翁田地檢清界畔人畜草木各安其位猶是轉句假饒到得水窮山盡水落草枯歸家穩坐日空四海始是半提然後不守寒嵒異草直待冰河燄發途中不離家舍家舍不離途中庶可會全提底時節要識全提時節麼按拄杖云橫按莫邪全正今太平寰宇斬癡頑卓一卓下座先老和尚十週忌上堂身從無相中受身猶如幻出諸形相幻人心識本來無罪福皆空無所住所以諸佛從無所住處利生列祖從無所住處接物天地從無所住處覆載日月星辰從無所住處照臨時序從無所住處而寒暑往來江湖從無所住處而川流不息以至人畜草木飛潛動植莫不從無所住處而頭出頭沒諸人若向這裏著得隻眼則知先師底落處知得先師底落處則知諸佛列祖底落處既知諸佛列祖底落處則知一切人畜草木飛潛動植底落處淨裸裸赤洒洒沒可把亦任孤峰頂上壁立萬仞十字街頭灰頭上而驅耕奪食打鎖敲枷莫有識得者麼出來通箇消息看良久眾無出者師云蒼天蒼天先師去世遠矣擲拂子下座示眾放過一著未必不為好手纔見便鏟大似逐塊韓盧雖然事無一向妙在臨時直下來也作麼生回避噓一噓云一箭過遼西天中節小參五月五日天中節千妖百怪盡潛滅無論赤口說甚白舌艾虎威獰踞戶傍摩訶般若波羅蜜除夕小參烹露地白牛徒費己力三十日到了著甚死急拍香几云明朝是初一掃五峰學祖塔葉落江南根歸潭北祗陀林裏為家毘盧峰前作宅惡聲流布滿寰中千眼大悲窺莫及既窺莫及未審如何與老祖相見拈香云擬議思量天地懸隔掃養拙明祖塔打破水桶金粟寺裏大人相贏得溈山天童室中長孫子得五峰老祖一牛還慧山師翁一馬踏殺天下人聲光傾四野拈香打一圓相于中作女人拜云我本自家兒孫全無些子客話掃慧山老和尚塔孤危壁立迥絕躋攀佛祖到來退身有分今日不肖徵孫未審作何行逕喝一喝云直踏毘盧頂上行
