body:
  text: 記室力能録舉古舉鼓山赴閬王請雪峰門送云一隻聖箭射入九重城裏去也孚上座云和尚是伊未在峰云渠是徹底人孚云若不信待某甲去勘過遂往中路把住云師兄甚麼處去山云九重城裏去孚云忽遇三軍圍繞時如何山云他家自有通霄路孚云恁麼則離宮失殿去也山云何處不稱尊孚便回謂峰云好隻聖箭被我折卻了也遂舉前話峰云渠有語在孚云這凍膿猶有鄉情在師云且道這聖箭畢竟是有折處無折處若道有要且問答分明若道無爭奈孚老不肯具出格眼者定當看舉興教坦和尚開堂日省宗化主出問諸佛未出世人人鼻孔撩天祖師既西來因甚麼杳無消息坦云雞足峰前風悄然宗云未在更道坦云大雪滿長安宗云無人識此意令我憶南泉拂袖歸衆更不禮拜坦云新興教今日失利歸方丈請宗至云適來錯抵對一轉語人天衆前何不禮拜蓋覆卻宗云大丈夫膝下有黃金爭肯拜無眼長老坦云我別有語也宗理前問至未在更道處坦云我有三十棒寄打雪竇宗乃禮拜師云興教當斷不斷反招其亂若也正令全提免致遭人檢點宗化主雖具作家眼腦也是龍頭蛇尾舉玄沙同天龍斫柴次見一虎龍云和尚虎沙云是汝虎歸院後問適來見虎云是汝未審尊意如何沙云娑婆世界有四種極重障若人透得許汝出陰界師云兩個弄泥圖漢殊不顧傍觀者團舉金陵奉先深禪師同明和尚到淮河見人牽網有魚從網透出深云俊哉一似個衲僧相似明云雖然如是爭如不撞入網羅好深云明兄你欠悟在明至中夜方省師云金陵出得入不得明老入了出不得莫有能出能入者麼三生六十劫舉丹霞訪龐居士見靈昭女洗菜乃問居士在否女放下菜籃叉手而立霞又問居士在否女提籃便行霞便回須臾居士歸女舉似前話士云丹霞在否女云去也士云赤土塗牛奶師云盡道靈昭收放自由殊不知被丹霞勘徹骨髓居士雖則明鏡當臺也未免雪上加霜舉靈雲見桃花悟道作偈云三十年來尋劍客幾回葉落又抽枝自從一見桃花後直至于今更不疑有僧舉似玄沙沙云諦當甚諦當敢保老兄未徹在衆疑此語沙乃問地藏云我恁麼道你作麼生會藏云不是桂琛即走殺天下人師云大小玄沙令行不全雖然秪如地藏恁麼道畢竟憑何道理有人道得出許你具越格眼舉須菩提問舍利弗夢中説六波羅密與覺時同異弗云此義深遠吾不能説上方有彌勒大士深明此義汝往問彼當為汝説提即往問勒曰誰是彌勒誰云彌勒師震聲一喝云當時若下得這一喝管教耀古騰今復顧左右云汝等諸人還覺腦門重麼舉僧問法眼如何是佛眼云汝是慧超師云領取勾頭意莫認定盤星舉劉鐵磨到溈山山云老牸牛汝來也磨云來日臺山大會齋和尚還去麼山放身作臥勢磨便出去師云這則公案一往觀去賓主歷然仔細看來有得有失且道誰得誰失舉定上座問臨濟如何是佛法大意濟下禪床擒住打一掌便拓開定佇立傍僧云定上座何不禮拜定方禮拜忽然大悟師云直饒玄會得也是眼中塵舉風穴在郢州衙內上堂云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時有盧陂長老出問某有鐵牛之機請師不搭印穴云慣釣鯨鯢沉巨浸卻嗟蛙步𩥇泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云還記得話頭麼陂擬開口穴又打一拂子牧主云佛法與王法一般穴云你見甚麼道理主云當斷不斷反招其亂穴便下座師云風穴令行不全牧主與麼道也好與一拂子舉鏡清問僧門外是什麼聲僧云雨滴聲清云衆生顛倒迷己逐物僧云和尚作麼生清云泊不迷己僧云意旨如何清云出身猶可易脫體道應難師云大小鏡清廉纖不少舉馬祖與百丈行次見野鴨飛過祖云是甚麼丈云野鴨子祖云甚處去也丈云飛過去也祖把丈鼻頭一扭丈作痛聲祖云何曾飛去丈於此有省師云馬師不奈船何打破戽斗雖然為人須為徹殺人須見血舉雲門問僧近離甚處僧云西禪門云西禪有何言句僧展兩手門打一掌僧云某甲話在門展兩手僧無語門又打一掌師云雲門固是眼親手便然要活這僧猶未許在舉僧問趙州至道無難唯嫌揀擇是時人窠窟否州云曾有人問我直得五年分訴不下師云這有年無德漢大似箇無齒大蟲你等諸人還識他利害處麼若也識得許你具衲僧眼舉雲門垂語云乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上師云這寶若只在形山終屬乾坤籠罩何足貴哉須知汝等諸人各有無價摩尼若也荐得一生受用不盡擊禪床下座舉南泉一日因兩堂爭貓兒泉提起貓云道得即不斬衆無對泉斬貓為兩段至晚舉問趙州州脫草鞋頂戴而出泉云子若在即救得貓兒師云南泉正令全提趙州轉身活潑雖則賓主歷然要未踏著關捩子在舉外道問佛不問有言不問無言世尊良久外道讚歎云世尊大慈大悲開我迷雲令我得入乃禮拜而去去後阿難問外道有何所證而言得入佛云如世良馬見鞭影而行師云外道面塗世尊世尊熱瞞阿難一夥販私鹽漢好各與三十烏藤何故見事不平誰認得衲僧正令自當行舉南泉歸宗麻谷國禮忠國師泉于地上畫一圓相云道得即去宗于圓相中坐谷作女人拜泉云與麼則不去也宗云是何心幸師云一夥弄精魂漢未出門時腳跟下好與三十棒舉金牛每至齋時自將飯桶于僧堂前作舞復呵呵大笑云菩薩子吃飯來師云金牛雖則殷勤太煞看來也是無端設有個出來問和尚又作麼生但對他道自來一雙窮相手不曾低揖等間人舉僧問投子一切聲是佛聲是否子云是僧云和尚莫豚沸碗鳴聲子便打僧又問粗言及細語皆歸第一義是否子云是僧云喚和尚作頭驢得麼子便打師云有頭無尾漢當時何不拗折拄杖熱面再唾舉僧問藥山平田淺草麈鹿成群如何射得塵中主山云看箭僧放身便倒山云侍者拖出僧便走山云弄泥團漢有甚麼限師云雖似見機而作卻也隈刀避劍若解當鋒取勝果然是員戰將舉梁武帝問達磨如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識帝不契磨乃渡江至魏師云祖師純剛打就武帝生鐵鎔成驀劄相逢佳話千古雖然如是門庭施設即不無若約衲僧門下須別有振作始得諸人脫或遲疑山僧不免別行一路去也呵呵大笑下座舉文殊普賢起佛見法見世尊以威神力貶向二鐵圍山師云有等瞎眼阿師見恁般公案便道動念即乖大似狂狗逐塊真上座見處與諸方各別如今設有起佛見法見底無底鉢盂盛飯供養伊何故聻從前汗馬無人識秪要重論蓋代功舉三聖透網念鱗因緣師云我即不然透網金鱗未審以何為食木札羹鐵釘飯千五百人善知識話頭也不識莫怪空疏伏惟尚嚮頌古舉誰是彌勒誰云彌勒因緣誰是彌勒云彌勒眼睛鼻子俱突出衲僧撞見眼頭高盡力提持去不得舉興教坦和尚開堂因緣無人識意憶南泉鼻孔撩天也被穿等間運出鐵牛機華嶽三峰倒插天舉玄沙同天龍斫柴因緣五五二十五打破鹽官鼓覿面絶疏親特地大家補大家補四七二三面相睹舉德山到溈山因緣掣電轟雷運略韜收來放出在秋毫坐觀成敗溈山老陷虎機能用不勞舉雪峰示衆云盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看堪笑雪峰老婆禪無端拈出教人看可憐待兔守株客不解風前聽杜鵑舉僧問洞山如何是佛山云麻三斤如何是佛麻三斤當陽獨露絶疏親雖然佛法無多子倒底還他手眼明舉俱胝凡有僧問只豎一指俱胝佛法不爭多試問時人見也麼擬向指頭尖上會鷂子早已過新羅舉僧問寒暑到來如何回避回避寒暑枉勞神無寒暑處語豈誠鴛鴦繡出從君看不把金針度與人舉良禪客問欽山一鏃破三關時如何山云放出關中主看良云與麼則知過必改山云更待何時良云好箭放不著所在便出山云闍黎且來良回首山云一鏃破三關且止試與欽山發箭看良擬議山打七棒云且聽這漢疑三十年關中主尊寰宇一鏃三關知幾許氣宇信如王誰敢嬰其武堪笑負命者有眼還同瞽報君知莫莽鹵未解行人休離母舉僧從定州會裏到烏臼臼云甚處來僧云定州臼云定州法道何似這裏僧云不別臼云若不別更轉彼中去便打僧云棒頭有眼不得草草打人臼云今日打著一個又打三下僧便出臼云屈棒元來有人喫在僧轉身云爭奈杓柄在和尚手裏臼云汝要山僧與汝僧奪棒打臼三下臼云屈棒屈棒僧云有人喫在臼云草草打著個漢僧禮拜臼云卻與麼去僧大笑而出臼云消得恁麼消得恁麼作者相逢迥不同針縫影裏騎大鵬李廣當年入虜庭看來未足盡英雄舉玄沙示衆云諸方老宿盡道接物利生忽遇三種病人來作麼生接患盲者拈椎豎拂他又不見患聾者語言三昧他又不聞患啞者教他説又説不得且作麼生接若接此人不得佛法無有靈驗有僧請益雲門門云禮拜著僧拜起門以柱杖桎僧退後門云汝不患盲復喚近前來僧近前門云汝不患聾乃云還會麼僧云不會門云汝不患啞其僧于此有省一藥能痊三般病三般病藥一般性金博金兮水洗水作者還將病醫病舉盤山垂語云三界無法何處求心四大本空佛依何住璿璣不動寂爾無痕覿面相呈更無餘事珍重世界身心徹底窮與誰把手上高峰飢食渴飲眠高枕曉起扶桑日已紅
